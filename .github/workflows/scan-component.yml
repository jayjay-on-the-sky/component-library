name: Scan & Extract Component

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'URL or UI description to extract a component from'
        required: true
        type: string
      component_name:
        description: 'PascalCase name for the extracted component'
        required: true
        type: string
      category:
        description: 'Component category'
        required: false
        default: 'Display'
        type: string

permissions:
  contents: write

jobs:
  scan:
    name: Scan "${{ inputs.component_name }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Extract component
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node .github/scripts/scan-component.js \
            "${{ inputs.source }}" \
            "${{ inputs.component_name }}" \
            "${{ inputs.category }}"

      - name: Commit and push
        run: |
          git config user.name "CompLib Bot"
          git config user.email "complib-bot@users.noreply.github.com"
          git add src/components/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat(component): extract ${{ inputs.component_name }} from scan

Source: ${{ inputs.source }}"
            git push
          fi
