name: Generate Component

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Plain-English description of the component to generate'
        required: true
        type: string
      component_name:
        description: 'PascalCase component name (e.g. PricingCard)'
        required: true
        type: string
      category:
        description: 'Component category (Actions|Display|Forms|Layout|Overlays|Feedback|Navigation|Sections)'
        required: false
        default: 'Display'
        type: string

permissions:
  contents: write

jobs:
  generate:
    name: Generate "${{ inputs.component_name }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Generate component
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node .github/scripts/generate-component.js \
            "${{ inputs.prompt }}" \
            "${{ inputs.component_name }}" \
            "${{ inputs.category }}"

      - name: Commit and push
        run: |
          git config user.name "CompLib Bot"
          git config user.email "complib-bot@users.noreply.github.com"
          git add src/components/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat(component): add ${{ inputs.component_name }}

Generated by CompLib Bot from prompt:
${{ inputs.prompt }}"
            git push
          fi
